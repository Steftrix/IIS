services:

  # ── DS_1: ORACLE XE 21c ───────────────────────────────────
  oracle:
    image: container-registry.oracle.com/database/express:21.3.0-xe
    container_name: oracle-xe-21c
    ports:
      - "1521:1521"    # SQL*Net / JDBC
      - "5500:5500"    # Enterprise Manager Express
      - "8080:8080"    # ORDS (enable later for L5 bonus)
    environment:
      ORACLE_PWD: Oracle21c
    volumes:
      - oracle_data:/opt/oracle/oradata
      - ./data/csv:/opt/oracle/csv:ro          # DS_6 + SQL*Loader inputs
      - ./oracle/scripts:/opt/oracle/scripts/startup:ro
    healthcheck:
      test: ["CMD-SHELL", "echo 'SELECT 1 FROM DUAL;' | sqlplus -s system/Oracle21c@//localhost:1521/XEPDB1 || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 15
      start_period: 180s

  # ── DS_2: POSTGRESQL 14 ───────────────────────────────────
  postgres:
    image: postgres:14-alpine
    container_name: iis-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: iis_user
      POSTGRES_PASSWORD: iis_pass
      POSTGRES_DB: iis_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data/csv:/csv:ro
      - ./postgres/scripts:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iis_user -d iis_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgREST for DS_2 — exposes iis_db on port 3000
  postgrest-pg:
    image: postgrest/postgrest:v12.0.2
    container_name: iis-postgrest-pg
    ports:
      - "3000:3000"
    environment:
      PGRST_DB_URI: postgres://iis_user:iis_pass@postgres:5432/iis_db
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: iis_user
      PGRST_OPENAPI_SERVER_PROXY_URI: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy

  # ── DS_3: TIMESCALEDB ─────────────────────────────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg14
    container_name: iis-timescaledb
    ports:
      - "5433:5432"    
    environment:
      POSTGRES_USER: iis_user
      POSTGRES_PASSWORD: iis_pass
      POSTGRES_DB: iis_events
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./data/csv:/csv:ro
      - ./timescaledb/scripts:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iis_user -d iis_events"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgREST for DS_3 — exposes iis_events on port 3001
  # Oracle: UTL_HTTP.REQUEST('http://postgrest-ts:3000/events?occurred_at=gte.2025-01-01')
  postgrest-ts:
    image: postgrest/postgrest:v12.0.2
    container_name: iis-postgrest-ts
    ports:
      - "3001:3000"
    environment:
      PGRST_DB_URI: postgres://iis_user:iis_pass@timescaledb:5432/iis_events
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: iis_user
      PGRST_OPENAPI_SERVER_PROXY_URI: http://localhost:3001
    depends_on:
      timescaledb:
        condition: service_healthy

  # ── DS_4: MONGODB 6 ───────────────────────────────────────
  mongodb:
    image: mongo:6
    container_name: iis-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: iis_admin
      MONGO_INITDB_ROOT_PASSWORD: iis_pass
      MONGO_INITDB_DATABASE: iis_db
    volumes:
      - mongo_data:/data/db
      - ./data/csv:/csv:ro
      - ./mongodb/scripts:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # RestHeart v7 for DS_4 — REST wrapper for MongoDB on port 8081
  restheart:
    image: softinstigate/restheart:7.6.4
    container_name: iis-restheart
    ports:
      - "8081:8080"
    environment:
      RHO: "/mclient/connection-string->'mongodb://iis_admin:iis_pass@mongodb:27017/?authSource=admin';/http-listener/host->'0.0.0.0';/mongo/mongo-mounts->[{'what':'iis_db','where':'/'}];/mongo/secured->false"
      

  # ── DS_5: NEO4J 5 ─────────────────────────────────────────
  neo4j:
    image: neo4j:5
    container_name: iis-neo4j
    ports:
      - "7474:7474"    # HTTP REST API + Browser UI
      - "7687:7687"    # Bolt (used by Neo4j Browser internally)
    environment:
      NEO4J_AUTH: neo4j/neo4j_admin
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_dbms_security_procedures_allowlist: "apoc.*"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./neo4j/import:/var/lib/neo4j/import   # CSVs for Cypher LOAD CSV
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7474"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
 

  # ── L5: SPRING BOOT REST ──────────────────────────────────
  # Uncomment once the Spring Boot project is created.
  # Connects to Oracle FDBO schema and exposes integration
  # views as JSON REST endpoints.
  #
  # springboot:
  #   build:
  #     context: ./springboot
  #     dockerfile: Dockerfile
  #   container_name: iis-springboot
  #   ports:
  #     - "8083:8080"
  #   environment:
  #     SPRING_DATASOURCE_URL: jdbc:oracle:thin:@oracle:1521/XEPDB1
  #     SPRING_DATASOURCE_USERNAME: FDBO
  #     SPRING_DATASOURCE_PASSWORD: fdbo_pass
  #     SPRING_DATASOURCE_DRIVER_CLASS_NAME: oracle.jdbc.OracleDriver
  #   depends_on:
  #     oracle:
  #       condition: service_healthy


# ── VOLUMES ───────────────────────────────────────────────────
volumes:
  oracle_data:
  postgres_data:
  timescale_data:
  mongo_data:
  neo4j_data:
  neo4j_logs:
